<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="תכנון 20-24.5">
  <title>תכנון שבועי 20-24.5</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:#F7F6F3;font-family:'Rubik',Tahoma,sans-serif;overscroll-behavior:none}
    button{font-family:'Rubik',Tahoma,sans-serif}
    ::-webkit-scrollbar{display:none}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;
const S=8, E=23, PPH=58, TH=E-S;
const DAYS=[
  {name:"שלישי", date:"20/5", tag:""},
  {name:"רביעי", date:"21/5", tag:""},
  {name:"חמישי", date:"22/5", tag:"ערב חג"},
  {name:"שישי",  date:"23/5", tag:"שבועות"},
  {name:"שבת",   date:"24/5", tag:""},
];
const HOURS=Array.from({length:TH+1},(_,i)=>S+i);
const CAT={
  blocked: {label:"מחויבות",  c:"#F43F5E", bg:"rgba(244,63,94,0.13)",   icon:"🔒"},
  workout: {label:"אימון",    c:"#10B981", bg:"rgba(16,185,129,0.13)",   icon:"🧘"},
  yin:     {label:"Yin",      c:"#8B5CF6", bg:"rgba(139,92,246,0.15)",   icon:"✨"},
  meal:    {label:"ארוחות",   c:"#D97706", bg:"rgba(217,119,6,0.11)",    icon:"🍽️"},
  admin:   {label:"אדמין",    c:"#2563EB", bg:"rgba(37,99,235,0.11)",    icon:"📧"},
  content: {label:"תוכן",    c:"#0891B2", bg:"rgba(8,145,178,0.11)",    icon:"📱"},
  retreat: {label:"ריטריט",   c:"#B45309", bg:"rgba(180,83,9,0.12)",     icon:"🏕️"},
  study:   {label:"קורס קארין",c:"#65A30D",bg:"rgba(101,163,13,0.13)",   icon:"📚"},
  client:  {label:"לקוח",    c:"#7C3AED", bg:"rgba(124,58,237,0.12)",   icon:"💼"},
  medical: {label:"בדיקה",   c:"#DC2626", bg:"rgba(220,38,38,0.11)",    icon:"🏥"},
  nophone: {label:"ללא טלפון",c:"#64748B", bg:"rgba(100,116,139,0.09)",  icon:"📵"},
  holiday: {label:"חג",      c:"#F59E0B", bg:"rgba(245,158,11,0.1)",    icon:"🕊️"},
};
const RAW=[
  {id:101,day:0,s:"09:15",e:"10:15",t:"Vinyasa",n:"בר אלקלעי · בת גלים",type:"workout"},
  {id:102,day:0,s:"10:15",e:"11:00",t:"ארוחת בוקר",n:"אחרי אימון",type:"meal"},
  {id:103,day:0,s:"11:00",e:"12:15",t:"קורס קארין",n:"לימוד עצמי",type:"study"},
  {id:104,day:0,s:"12:30",e:"17:30",t:"כרמלית",n:"עבודה עם חברה",type:"blocked"},
  {id:105,day:0,s:"17:30",e:"18:15",t:"ארוחת ערב",n:"",type:"meal"},
  {id:106,day:0,s:"18:30",e:"22:00",t:"ריטריט",n:"מנהלות + תוכן",type:"retreat"},
  {id:107,day:0,s:"22:00",e:"23:00",t:"ללא טלפון",n:"",type:"nophone"},
  {id:201,day:1,s:"09:00",e:"09:30",t:"ארוחת בוקר",n:"",type:"meal"},
  {id:202,day:1,s:"09:30",e:"10:30",t:"אדמין",n:"מיילים · הודעות",type:"admin"},
  {id:203,day:1,s:"10:30",e:"12:00",t:"קורס קארין",n:"לימוד עצמי",type:"study"},
  {id:204,day:1,s:"12:00",e:"12:45",t:"ארוחת צהריים",n:"",type:"meal"},
  {id:205,day:1,s:"13:00",e:"17:30",t:"ריטריט",n:"מנהלות + תוכן",type:"retreat"},
  {id:206,day:1,s:"17:30",e:"19:00",t:"פגישה",n:"עלא באלי",type:"blocked"},
  {id:207,day:1,s:"19:00",e:"19:50",t:"נסיעה + הכנה",n:"לנמל",type:"blocked"},
  {id:208,day:1,s:"19:50",e:"21:05",t:"Yin + Sounds",n:"כינרת אוחיון · הנמל",type:"yin"},
  {id:209,day:1,s:"21:05",e:"21:50",t:"ארוחת ערב",n:"",type:"meal"},
  {id:210,day:1,s:"22:00",e:"23:00",t:"ללא טלפון",n:"",type:"nophone"},
  {id:301,day:2,s:"09:00",e:"09:30",t:"ארוחת בוקר",n:"",type:"meal"},
  {id:302,day:2,s:"09:30",e:"11:30",t:"ריטריט",n:"מנהלות + תוכן",type:"retreat"},
  {id:303,day:2,s:"11:30",e:"12:00",t:"נסיעה",n:"לבדיקה",type:"blocked"},
  {id:304,day:2,s:"12:00",e:"13:00",t:"בדיקה רפואית",n:"",type:"medical"},
  {id:305,day:2,s:"13:00",e:"14:00",t:"ארוחת צהריים",n:"",type:"meal"},
  {id:306,day:2,s:"14:00",e:"16:00",t:"קורס קארין",n:"בלוק לימוד",type:"study"},
  {id:307,day:2,s:"16:00",e:"22:00",t:"ערב חג",n:"משפחה · מנוחה",type:"holiday"},
  {id:308,day:2,s:"22:00",e:"23:00",t:"ללא טלפון",n:"",type:"nophone"},
  {id:401,day:3,s:"09:00",e:"12:15",t:"בוקר חג",n:"ארוחה · מנוחה",type:"holiday"},
  {id:402,day:3,s:"12:15",e:"13:15",t:"Vinyasa",n:"ציפורה גלוק · בת גלים",type:"workout"},
  {id:403,day:3,s:"13:15",e:"23:00",t:"שבועות",n:"חג שמח",type:"holiday"},
  {id:501,day:4,s:"08:30",e:"23:00",t:"שבת",n:"מנוחה / אימון אופציונלי",type:"holiday"},
];
function px(t){const[h,m]=t.split(":").map(Number);return(h+m/60-S)*PPH;}
function Block({ev,onToggle}){
  const cat=CAT[ev.type];
  const top=px(ev.s);
  const height=Math.max(px(ev.e)-top,20);
  const tiny=height<34,small=height<54;
  return(
    <div onClick={()=>onToggle(ev.id)}
      title={ev.t+(ev.n?" · "+ev.n:"")+" | "+ev.s+"-"+ev.e}
      style={{position:"absolute",top,left:2,right:2,height,background:ev.done?"rgba(241,245,249,0.9)":cat.bg,border:"1px solid "+(ev.done?"#E2E8F0":cat.c),borderRight:"3.5px solid "+(ev.done?"#CBD5E1":cat.c),borderRadius:7,padding:tiny?"1px 4px":"3px 6px",cursor:"pointer",overflow:"hidden",userSelect:"none",zIndex:1,opacity:ev.done?0.45:1}}>
      <div style={{fontSize:tiny?7.5:9,fontWeight:700,color:ev.done?"#94A3B8":cat.c,textDecoration:ev.done?"line-through":"none",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",lineHeight:1.2}}>
        {ev.done?"✓ ":tiny?"":cat.icon+" "}{ev.t}
      </div>
      {!tiny&&!small&&ev.n&&!ev.done&&(
        <div style={{fontSize:7.5,color:cat.c,opacity:0.7,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{ev.n}</div>
      )}
      {!tiny&&(
        <div style={{fontSize:7.5,color:ev.done?"#CBD5E1":cat.c,opacity:0.6}}>{ev.s}-{ev.e}</div>
      )}
    </div>
  );
}
function App(){
  const[events,setEvents]=useState(RAW.map(e=>({...e,done:false})));
  const[hidden,setHidden]=useState(new Set(["nophone"]));
  const[tab,setTab]=useState("cal");
  const toggle=id=>setEvents(p=>p.map(e=>e.id===id?{...e,done:!e.done}:e));
  const toggleHide=k=>setHidden(p=>{const s=new Set(p);s.has(k)?s.delete(k):s.add(k);return s;});
  const wDone=events.filter(e=>(e.type==="workout"||e.type==="yin")&&e.done).length;
  const rDone=events.filter(e=>e.type==="retreat"&&e.done).length;
  const stDone=events.filter(e=>e.type==="study"&&e.done).length;
  const visible=events.filter(e=>!hidden.has(e.type));
  const retreatTotal=events.filter(e=>e.type==="retreat").length;
  const studyTotal=events.filter(e=>e.type==="study").length;
  return(
    <div style={{direction:"rtl",fontFamily:"'Rubik',Tahoma,sans-serif",background:"#F7F6F3",minHeight:"100svh",paddingBottom:80}}>
      <div style={{background:"white",padding:"14px 16px 10px",boxShadow:"0 1px 8px rgba(0,0,0,0.07)",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div>
            <div style={{fontSize:9,letterSpacing:2,color:"#E8510A",fontWeight:700}}>20-24 מאי 2026 · ריטריט בפתח 🏕️</div>
            <div style={{fontSize:18,fontWeight:800,color:"#1E293B",marginTop:1}}>תכנון שבועי</div>
          </div>
          <div style={{display:"flex",gap:6}}>
            {[{l:"📊",k:"cal"},{l:"📋",k:"list"},{l:"ℹ️",k:"info"}].map(({l,k})=>(
              <button key={k} onClick={()=>setTab(k)} style={{width:34,height:34,borderRadius:9,border:"none",background:tab===k?"#E8510A":"#F1F5F9",fontSize:15,cursor:"pointer"}}>{l}</button>
            ))}
          </div>
        </div>
        <div style={{display:"flex",gap:5}}>
          {[{label:"אימונים",done:wDone,total:3,c:"#10B981"},{label:"ריטריט",done:rDone,total:retreatTotal,c:"#B45309"},{label:"קורס קארין",done:stDone,total:studyTotal,c:"#65A30D"}].map(({label,done,total,c})=>(
            <div key={label} style={{flex:1,background:"#F8FAFC",borderRadius:10,padding:"6px 7px",textAlign:"center"}}>
              <div style={{fontSize:8,color:"#94A3B8",marginBottom:1}}>{label}</div>
              <div style={{fontSize:13,fontWeight:700,color:c}}>{done}<span style={{fontSize:9,color:"#CBD5E1"}}>/{total}</span></div>
              <div style={{height:3,background:"#E2E8F0",borderRadius:4,marginTop:2,overflow:"hidden"}}>
                <div style={{height:"100%",width:Math.min((done/total)*100,100)+"%",background:c,borderRadius:4,transition:"width 0.4s"}}/>
              </div>
            </div>
          ))}
        </div>
      </div>
      {tab==="cal"&&(
        <div style={{padding:"10px 8px 0"}}>
          <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8,justifyContent:"center"}}>
            {Object.entries(CAT).map(([k,cat])=>{
              const off=hidden.has(k);
              return(
                <button key={k} onClick={()=>toggleHide(k)} style={{border:"1.5px solid "+(off?"#E2E8F0":cat.c),background:off?"#F8FAFC":cat.bg,color:off?"#94A3B8":cat.c,borderRadius:20,padding:"2px 8px",fontSize:8.5,fontWeight:600,cursor:"pointer",opacity:off?0.5:1}}>
                  {cat.icon} {cat.label}
                </button>
              );
            })}
          </div>
          <div style={{background:"white",borderRadius:14,boxShadow:"0 2px 16px rgba(0,0,0,0.07)",overflow:"hidden",overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
            <div style={{minWidth:420}}>
              <div style={{display:"flex",borderBottom:"1.5px solid #F1F5F9",position:"sticky",top:0,background:"white",zIndex:10}}>
                <div style={{width:34,flexShrink:0}}/>
                {DAYS.map((d,i)=>{
                  const isHoliday=d.tag.includes("שבועות")||d.name==="שבת";
                  const hasW=events.some(e=>e.day===i&&(e.type==="workout"||e.type==="yin"));
                  return(
                    <div key={i} style={{flex:1,textAlign:"center",padding:"6px 2px",borderRight:i<4?"1px solid #F1F5F9":"none",background:isHoliday?"#FFFBEB":hasW?"#FAFFF8":"white"}}>
                      <div style={{fontSize:10,fontWeight:700,color:"#1E293B"}}>{d.name}</div>
                      <div style={{fontSize:8,color:"#94A3B8"}}>{d.date}</div>
                      {d.tag&&<div style={{fontSize:7.5,color:"#F59E0B",fontWeight:600,marginTop:1}}>{d.tag}</div>}
                    </div>
                  );
                })}
              </div>
              <div style={{display:"flex"}}>
                <div style={{width:34,flexShrink:0,position:"relative",height:TH*PPH}}>
                  {HOURS.map(h=>(
                    <div key={h} style={{position:"absolute",top:(h-S)*PPH-7,width:"100%",textAlign:"center",fontSize:8,color:"#CBD5E1",fontWeight:500}}>{String(h).padStart(2,"0")}:00</div>
                  ))}
                </div>
                {DAYS.map((_,di)=>(
                  <div key={di} style={{flex:1,position:"relative",height:TH*PPH,borderRight:di<4?"1px solid #F8FAFC":"none"}}>
                    {HOURS.map(h=>(
                      <div key={h} style={{position:"absolute",top:(h-S)*PPH,width:"100%",borderTop:h%2===0?"1px solid #F1F5F9":"1px dashed #F9FAFB"}}/>
                    ))}
                    {visible.filter(e=>e.day===di).map(ev=>(
                      <Block key={ev.id} ev={ev} onToggle={toggle}/>
                    ))}
                  </div>
                ))}
              </div>
            </div>
          </div>
          <p style={{textAlign:"center",color:"#CBD5E1",fontSize:9,marginTop:6}}>לחצי על אייטם לסימון ✓</p>
        </div>
      )}
      {tab==="list"&&(
        <div style={{padding:"12px 14px 0"}}>
          {DAYS.map((d,di)=>{
            const dayEvs=events.filter(e=>e.day===di).sort((a,b)=>a.s.localeCompare(b.s));
            return(
              <div key={di} style={{marginBottom:14}}>
                <div style={{fontWeight:700,fontSize:13,color:"#1E293B",marginBottom:5,display:"flex",alignItems:"center",gap:6}}>
                  <div style={{width:28,height:28,borderRadius:8,background:"#E8510A",color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800}}>{d.date.split("/")[0]}</div>
                  {d.name} {d.tag&&<span style={{fontSize:10,color:"#F59E0B"}}>· {d.tag}</span>}
                </div>
                {dayEvs.map(ev=>{
                  const cat=CAT[ev.type];
                  return(
                    <div key={ev.id} onClick={()=>toggle(ev.id)} style={{display:"flex",alignItems:"center",gap:10,background:"white",borderRadius:10,padding:"9px 12px",marginBottom:4,cursor:"pointer",borderRight:"3px solid "+(ev.done?"#CBD5E1":cat.c),opacity:ev.done?0.5:1,boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
                      <div style={{fontSize:13}}>{ev.done?"✅":cat.icon}</div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:11,fontWeight:600,color:ev.done?"#94A3B8":"#1E293B",textDecoration:ev.done?"line-through":"none"}}>{ev.t}</div>
                        {ev.n&&<div style={{fontSize:9,color:"#94A3B8",marginTop:1}}>{ev.n}</div>}
                      </div>
                      <div style={{fontSize:9,color:"#94A3B8",fontWeight:500}}>{ev.s}-{ev.e}</div>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      )}
      {tab==="info"&&(
        <div style={{padding:"14px"}}>
          {[
            {e:"🏕️",t:"ריטריט 29-30.5 מתקרב",d:'שלישי ערב 3.5h · רביעי אחה"צ 4.5h · חמישי בוקר 2h ~ 10 שעות'},
            {e:"📚",t:"קורס קארין השבוע",d:"שלישי 11:00 · רביעי · חמישי ~ 4 שעות"},
            {e:"🧘",t:"3 אימונים",d:"שלישי בוקר · רביעי Yin · שישי אימון חג"},
            {e:"🔒",t:"מחויבויות",d:"שלישי 12:30 כרמלית · רביעי 17:30 עלא באלי · חמישי 12:00 בדיקה"},
            {e:"🕊️",t:"שבועות שישי-שבת",d:"ריטריט מחכה - טעני כוח!"},
            {e:"📵",t:"ניתוק טלפון",d:"כל לילה מ-22:00"},
          ].map(({e,t,d})=>(
            <div key={t} style={{background:"white",borderRadius:13,padding:"13px 15px",marginBottom:9,boxShadow:"0 1px 6px rgba(0,0,0,0.05)"}}>
              <div style={{fontSize:18,marginBottom:3}}>{e}</div>
              <div style={{fontWeight:700,fontSize:13,color:"#1E293B",marginBottom:2}}>{t}</div>
              <div style={{fontSize:11,color:"#64748B",lineHeight:1.5}}>{d}</div>
            </div>
          ))}
        </div>
      )}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"white",borderTop:"1px solid #F1F5F9",display:"flex",padding:"8px 0 20px",boxShadow:"0 -4px 16px rgba(0,0,0,0.06)",zIndex:100}}>
        {[{label:"לוח",icon:"📊",key:"cal"},{label:"רשימה",icon:"📋",key:"list"},{label:"סיכום",icon:"ℹ️",key:"info"}].map(({label,icon,key})=>(
          <button key={key} onClick={()=>setTab(key)} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"4px 0"}}>
            <div style={{fontSize:17}}>{icon}</div>
            <div style={{fontSize:9,fontWeight:600,color:tab===key?"#E8510A":"#94A3B8"}}>{label}</div>
          </button>
        ))}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
